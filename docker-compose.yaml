services:
  wyoming-rapidfuzz-proxy:
    container_name: wyoming-rapidfuzz-proxy
    image: wyoming-rapidfuzz-proxy:latest
    environment:
      - URI=tcp://0.0.0.0:10310
      - STT_URI=tcp://HOME_ASSISTANT_IP_OR_URI:10300
      - CORRECTION_THRESHOLD=15
      - LANGUAGE=es
      - DEBUG_LOGGING=TRUE
      - IN_MEMORY_DB=TRUE
      - ALLOW_UNKNOWN=FALSE
      - CUSTOM_SENTENCES_DIRS=
      # Optional overrides. The image bundles pinned speech-to-phrase data here by default.
      - BUILTIN_SENTENCES_DIR=/opt/speech-to-phrase/sentences
      - SHARED_LISTS_PATH=/opt/speech-to-phrase/shared_lists.yaml
      - HASS_TOKEN=LONG_LIVED_TOKEN_HERE
      - HASS_URI=ws://HOME_ASSISTANT_IP_OR_URI:8123/api/websocket
    volumes:
      - ./data:/data
    ports:
      - 10310:10310
    restart: unless-stopped
        
        
